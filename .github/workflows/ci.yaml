name: CI

on:
  push:
    branches:
      - master
  pull_request:
  release:

jobs:
  tests:
    env:
      PIP_INDEX_URL: https://pypi.python.org/simple
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        tox_env:
          - tests
          - mypy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - run: |
          sudo apt-get -y install libzookeeper-mt-dev
          pip install tox
      - run: cd src && tox -e ${{ matrix.tox_env }}
