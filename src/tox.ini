[tox]
envlist = py
indexserver =
    default = http://pypi.yelpcorp.com/simple/

[testenv]
sitepackages = True
install_command = pip install --upgrade {opts} {packages}
deps = -rrequirements.txt

[testenv:py]
deps =
    {[testenv]deps}
    flake8
    pytest
    mock
commands =
    py.test {posargs:tests}
    flake8 nerve_tools tests

[flake8]
ignore = E501
