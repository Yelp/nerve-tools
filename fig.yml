lucid:
  build: dockerfiles/lucid
  command: bash -c "cd src && tox && dpkg-buildpackage -d -uc -us && mv ../*.deb ../dist/"
  volumes:
   - .:/work

itest:
  build: dockerfiles/itest/itest
  command: py.test /work/itest/itest.py
  hostname: itesthost.itestdomain
  privileged: true
  volumes:
   - .:/work
  links:
   - zookeeper
   - service

service:
  build: dockerfiles/itest/service

zookeeper:
  build: dockerfiles/itest/zookeeper
