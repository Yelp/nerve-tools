[tox]
skipsdist = true
indexserver =
    default = http://pypi.yelpcorp.com/simple/

[testenv]
deps = fig==0.5.2

[testenv:package_lucid]
setenv =
    FIG_FILE = dockerfiles/lucid/fig.yml
commands =
    fig build
    fig run lucid
    fig stop
    fig rm --force

[testenv:fix_permissions]
whitelist_externals = /bin/bash
setenv =
    FIG_FILE = dockerfiles/lucid/fig.yml
commands =
    fig build
    bash -c 'fig run lucid chown -R `id -u`:`id -g` /work'
    fig stop
    fig rm --force

[testenv:itest_lucid]
setenv =
    FIG_FILE = dockerfiles/itest/fig.yml
commands =
    fig build
    fig run itest
    fig stop
    fig rm --force
