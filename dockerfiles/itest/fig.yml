itest:
  build: dockerfiles/itest/itest
  hostname: itesthost.itestdomain
  privileged: true
  volumes:
   - .:/work
  links:
   - locationsuggest
   - geocoder
   - zookeeper

locationsuggest:
  build: dockerfiles/itest/location_suggest

geocoder:
  build: dockerfiles/itest/geocoder

zookeeper:
  build: dockerfiles/itest/zookeeper
